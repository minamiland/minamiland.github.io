  <!-- Background SVG Animation -->
  <div class="bg-animation">
    <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" preserveAspectRatio="xMidYMid slice">
      <g class="shapes">
        <!-- Plane: Rotating Square -->
        <rect class="shape plane-rect" width="140" height="140" fill="none" stroke="black" stroke-width="3" />
        
        <!-- Plane: Solid Triangle -->
        <polygon class="shape plane-triangle" points="0,100 58,0 116,100" fill="black" />
        
        <!-- Line: Diagonal Moving Line -->
        <line class="shape line-diagonal" x1="-10%" y1="-10%" x2="110%" y2="110%" stroke="black" stroke-width="2" />
        
        <!-- Line: Vertical Dashed Line -->
        <line class="shape line-dashed" x1="65%" y1="-10%" x2="65%" y2="110%" stroke="black" stroke-width="3" stroke-dasharray="16 16" />
        
        <!-- Dot: Large Solid Circle -->
        <circle class="shape dot-large" r="220" fill="black" opacity="0.3" />
        
        <!-- Dot: Small Outlined Circle -->
        <circle class="shape dot-small" r="45" fill="none" stroke="black" stroke-width="4" />
        
        <!-- Dot: Tiny Solid Dot -->
        <circle class="shape dot-tiny" r="8" fill="black" />
      </g>
    </svg>
